        // --- STREAMING_CHUNK:Helper Functions (Typewriter effect) --- //
        
        function typeWriter(text, elementId, speed = 30, callback = null) {
            const element = document.getElementById(elementId);
            if (!element) return;
            
            clearInterval(typewriterInterval);
            element.innerHTML = "";
            currentFullText = text;
            isTyping = true;
            
            let i = 0;
            // Handle newlines properly
            let formattedText = text.replace(/\n/g, '<br>');
            
            // Temporary div to parse HTML and type it out node by node would be complex.
            // For simplicity, we just type string and replace <br> as we go.
            // Since our text doesn't have complex HTML tags other than implied newlines, this simple approach works.
            
            let htmlToInject = "";
            let textArray = text.split('');

            typewriterInterval = setInterval(() => {
                if (i < textArray.length) {
                    if (textArray[i] === '\n') {
                        htmlToInject += '<br>';
                    } else {
                        htmlToInject += textArray[i];
                    }
                    element.innerHTML = htmlToInject;
                    
                    // Auto scroll to bottom while typing
                    contentDiv.scrollTop = contentDiv.scrollHeight;
                    i++;
                } else {
                    clearInterval(typewriterInterval);
                    isTyping = false;
                    if(callback) callback();
                }
            }, speed);
        }

        // Click anywhere to skip typewriter

            if (isTyping) {
                clearInterval(typewriterInterval);
                const element = document.querySelector('.typing-target');
                if (element) {
                    element.innerHTML = currentFullText.replace(/\n/g, '<br>');
                }
                isTyping = false;
                // Reveal buttons if they were hidden waiting for callback

                hiddenElements.forEach(el => {
                    el.classList.remove('hidden', 'opacity-0');
                    el.classList.add('opacity-100', 'transition-opacity', 'duration-500');
                });
                contentDiv.scrollTop = contentDiv.scrollHeight;

        });

                </div>
                <div class="hidden-until-typed hidden opacity-0 mt-4">
                    <button onclick="renderQuiz()" class="btn-option w-full py-4 rounded font-bold text-center">開始測驗 [START]</button>
                </div>
            `;
            
            typeWriter(introText, "intro-text", 30, () => {
                document.querySelector('.hidden-until-typed').classList.remove('hidden', 'opacity-0');
            });
        }

        function renderQuiz() {
            if (currentQuestion >= quizData.length) {
                calculatePersona();
                return;
            }

            phaseIndicator.innerText = `PHASE 01: 潛質測驗 (${currentQuestion + 1}/3)`;
            const qData = quizData[currentQuestion];
            
            let optionsHtml = '';
            qData.options.forEach(opt => {
                optionsHtml += `<button onclick="handleAnswer('${opt.id}')" class="btn-option w-full text-left p-4 rounded mb-3 text-sm leading-relaxed">${opt.text}</button>`;
            });

            contentDiv.innerHTML = `
                <div class="mb-6 font-bold text-lg text-green-300">
                    <span class="text-xs text-green-500 block mb-1">DATA GATHERING...</span>
                    ${qData.q}
                </div>
                <div class="flex flex-col space-y-2">
                    ${optionsHtml}
                </div>
            `;
        }

        function handleAnswer(choice) {
            scores[choice]++;
            currentQuestion++;
            renderQuiz();
        }

        // --- STREAMING_CHUNK:Persona calculation and branching logic --- //

        function calculatePersona() {
            // Find highest score
            let maxScore = -1;
            let finalChoice = 'A';
            
            for (const [key, value] of Object.entries(scores)) {
                if (value > maxScore) {
                    maxScore = value;
                    finalChoice = key;
                }
            }
            
            userPersona = personas[finalChoice];
            visitedLocations.push(userPersona.startLocation);
            
            phaseIndicator.innerText = "PHASE 01: 身份建立";
            
            contentDiv.innerHTML = `
                <div class="content-box animate-[fadeIn_0.5s_ease-out]">
                    <div class="text-xs text-green-500 mb-1">IDENTIFICATION CONFIRMED</div>
                    <h2 class="text-2xl font-bold text-white mb-2">${userPersona.name}</h2>
                    <p class="text-sm mb-4 text-green-300">${userPersona.desc}</p>
                    <div class="border-t border-green-800 pt-4 mt-4">
                        <div class="text-xs text-green-500 mb-1">ASSIGNED START POINT</div>
                        <div class="font-bold text-lg text-yellow-400">📍 ${userPersona.startLocation}</div>
                    </div>
                </div>
                
                <div class="mt-4 border border-green-800 p-4 rounded bg-black/50">
                    <h3 class="font-bold text-green-400 mb-2">${userPersona.taskTitle}</h3>
                    <div id="task-text" class="text-sm leading-relaxed typing-target min-h-[150px]"></div>
                </div>
                
                <div class="hidden-until-typed hidden opacity-0 mt-6">
                    <button onclick="phaseTwoIntro()" class="btn-option w-full py-4 rounded font-bold text-center">掃描完成，進入下一關 >></button>
                </div>
            `;

            typeWriter(userPersona.taskText, "task-text", 25, () => {
                document.querySelector('.hidden-until-typed').classList.remove('hidden', 'opacity-0');
            });
        }

        function phaseTwoIntro() {
            phaseIndicator.innerText = "PHASE 02: 突圍抉擇";
            const warningText = "⚠️ 警告！初始據點的防禦系統已啟動，留給你的時間不多了。\n\n你剛剛解鎖的情報中，隱藏著四組高頻加密訊號，它們分別指向龍岡深處的四個「戰術安全屋」。\n\n敵軍正朝你的位置包抄，特工，請立刻選擇你接下來的潛伏與突圍方向！";

            contentDiv.innerHTML = `
                <div class="flex items-center mb-4 text-red-500 font-bold border-l-4 border-red-500 pl-2">
                    <span class="animate-pulse mr-2">⚠️</span> ALERT TRIGGERED
                </div>
                <div id="warning-text" class="text-sm leading-relaxed mb-6 typing-target text-yellow-300"></div>
                
                <div id="options-container" class="hidden-until-typed hidden opacity-0 flex flex-col space-y-3 mt-4">
                    <button onclick="renderTaskTwo('雲南文化公園')" class="btn-option w-full text-left p-3 rounded text-sm">📡 解析訊號 > ${locationHints['雲南文化公園']}</button>
                    <button onclick="renderTaskTwo('孤軍忠貞突擊靶場')" class="btn-option w-full text-left p-3 rounded text-sm">📡 解析訊號 > ${locationHints['孤軍忠貞突擊靶場']}</button>
                    <button onclick="renderTaskTwo('龍岡森林公園')" class="btn-option w-full text-left p-3 rounded text-sm">📡 解析訊號 > ${locationHints['龍岡森林公園']}</button>
                    <button onclick="renderTaskTwo('魅力金三角商圈地標')" class="btn-option w-full text-left p-3 rounded text-sm">📡 解析訊號 > ${locationHints['魅力金三角商圈地標']}</button>
                </div>
            `;

            typeWriter(warningText, "warning-text", 25, () => {
                document.getElementById('options-container').classList.remove('hidden', 'opacity-0');
            });
        }

        function renderTaskTwo(location) {
            visitedLocations.push(location);
            phaseIndicator.innerText = `PHASE 02: ${location}`;
            const text = locationData[location];

            contentDiv.innerHTML = `
                <div class="content-box mb-6 border-l-4 border-yellow-500">
                    <div class="text-xs text-yellow-500 mb-1">CURRENT LOCATION</div>
                    <h2 class="text-xl font-bold text-white">📍 ${location}</h2>
                </div>
                <div id="location-text" class="text-sm leading-relaxed mb-8 typing-target min-h-[150px]"></div>
                
                <div class="hidden-until-typed hidden opacity-0 mt-auto">
                    <button onclick="phaseThreeIntro()" class="btn-option w-full py-4 rounded font-bold text-center bg-yellow-900/30 border-yellow-500 text-yellow-400 hover:bg-yellow-500 hover:text-black">任務完成，截獲新訊號 >></button>
                </div>
            `;

            typeWriter(text, "location-text", 25, () => {
                document.querySelector('.hidden-until-typed').classList.remove('hidden', 'opacity-0');
            });
        }

        // --- STREAMING_CHUNK:Dynamic crowd control simulation (Phase 3) --- //

        function phaseThreeIntro() {
            phaseIndicator.innerText = "PHASE 03: 終章分流";
            const hackText = "幹得好，特工！你已經連續突破了兩道防線。\n\n此時，你手上的數位情報盤發出急促的低鳴——距離解開《拼圖計畫》核心機密，只剩下最後一塊關鍵碎片！\n\n系統已為你即時駭入敵方通訊網，成功推算出目前「防禦最薄弱、最適合突圍」的 4 個全新座標。\n\n這將是前往大終點前的最後抉擇：";

            // Logic: Pick 4 locations not in visitedLocations
            let available = allLocations.filter(loc => !visitedLocations.includes(loc));
            // Shuffle
            available = available.sort(() => 0.5 - Math.random());
            let choices = available.slice(0, 4);

            let optionsHtml = '';
            choices.forEach(loc => {
                optionsHtml += `<button onclick="renderTaskThree('${loc}')" class="btn-option w-full text-left p-3 rounded mb-3 text-sm font-bold shadow-[0_0_10px_rgba(34,197,94,0.2)]">破解座標 > ${locationHints[loc]}</button>`;
            });

            contentDiv.innerHTML = `
                <div class="flex justify-between items-center mb-4 text-cyan-400 font-bold border-b border-cyan-800 pb-2">
                    <span><i class="fa-solid fa-satellite-dish animate-pulse"></i> 系統駭入成功</span>
                    <span class="text-xs">動態人流調配 ON</span>
                </div>
                <div id="hack-text" class="text-sm leading-relaxed mb-6 typing-target text-white"></div>
                
                <div id="options-container" class="hidden-until-typed hidden opacity-0 flex flex-col mt-2">
                    ${optionsHtml}
                </div>
            `;

            typeWriter(hackText, "hack-text", 25, () => {
                document.getElementById('options-container').classList.remove('hidden', 'opacity-0');
            });
        }

        function renderTaskThree(location) {
            visitedLocations.push(location);
            phaseIndicator.innerText = `PHASE 03: ${location}`;
            const text = locationData[location];

            contentDiv.innerHTML = `
                <div class="content-box mb-6 border-l-4 border-cyan-500">
                    <div class="text-xs text-cyan-500 mb-1">FINAL PUZZLE PIECE</div>
                    <h2 class="text-xl font-bold text-white">📍 ${location}</h2>
                </div>
                <div id="location-text" class="text-sm leading-relaxed mb-8 typing-target min-h-[150px]"></div>
                
                <div class="hidden-until-typed hidden opacity-0 mt-auto bg-green-900/40 p-4 rounded border border-green-500 text-center shadow-[0_0_15px_rgba(34,197,94,0.3)]">
                    <p class="text-white font-bold mb-3">核心情報鏈已全數解鎖！</p>
                    <p class="text-xs text-green-300 mb-4">請立刻前往最終集結點【忠貞新村文化園區】</p>
                    <button onclick="renderFinale()" class="btn-option w-full py-3 rounded font-bold uppercase tracking-wider bg-green-600 text-white">啟動發報機 (大結局)</button>
                </div>
            `;

            typeWriter(text, "location-text", 20, () => {
                document.querySelector('.hidden-until-typed').classList.remove('hidden', 'opacity-0');
            });
        }

        // --- STREAMING_CHUNK:Finale and Free-Roam --- //

        function renderFinale() {
            phaseIndicator.innerText = "FINAL: 忠貞新村文化園區";
            const finaleText = "「滋滋……呼叫代號『桃源』，總部已成功接收密碼。半個世紀的謎底，終於揭曉。」\n\n那份由情報員拼死守護的《拼圖計畫》，並不是軍事地圖，而是一封寫給桃園子民的「和平備忘錄」：\n\n『我們這群孤軍，終於在桃園龍岡找到了家。\n\n我們把最珍貴的寶藏，藏在了市場的米干香氣裡、清真寺的穹頂下、國旗屋的旗幟中。這份寶藏的名字，叫做「共榮與多元」。過去的歷史是散落的碎片，而你們的腳步，就是將碎片拼湊的線索。』\n\n感謝你用雙腳穿越歷史，用智慧解開塵封的記憶。";

            contentDiv.innerHTML = `
                <div class="text-center mb-6 animate-[fadeIn_1s_ease-out]">
                    <i class="fa-solid fa-circle-check text-5xl text-yellow-400 mb-2 drop-shadow-[0_0_10px_rgba(250,204,21,0.8)]"></i>
                    <h2 class="text-2xl font-bold text-white tracking-widest">任務達成</h2>
                </div>
                
                <div class="bg-gray-800/80 p-5 rounded-lg border border-gray-600 mb-6">
                    <div id="finale-text" class="text-sm leading-relaxed typing-target text-gray-200"></div>
                </div>

                <div class="hidden-until-typed hidden opacity-0 space-y-4">
                    <div class="bg-gradient-to-r from-yellow-600/20 to-orange-600/20 border border-yellow-500 p-3 rounded text-center">
                        <p class="text-yellow-400 font-bold text-sm">🏅 請至服務台領取「1/4 磁吸拼圖獎牌」</p>
                        <p class="text-xs text-gray-400 mt-1">並核銷您的 50 元數位美食金</p>
                    </div>
                    <button onclick="renderFreeRoam()" class="w-full py-3 rounded font-bold bg-white text-black hover:bg-gray-200 transition-colors shadow-[0_0_15px_rgba(255,255,255,0.5)]">開啟自由漫遊模式</button>
                </div>
            `;

            // Adding font-awesome dynamically for the check icon if not loaded
            const fa = document.createElement('link');
            fa.rel = 'stylesheet';
            fa.href = 'https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css';
            document.head.appendChild(fa);

            typeWriter(finaleText, "finale-text", 30, () => {
                document.querySelector('.hidden-until-typed').classList.remove('hidden', 'opacity-0');
            });
        }

        function renderFreeRoam() {
            phaseIndicator.innerText = "MODE: 自由漫遊";
            
            // Generate map pins based on visited status
            let pinsHtml = '';
            allLocations.forEach((loc, index) => {
                const isVisited = visitedLocations.includes(loc);
                const colorClass = isVisited ? 'bg-green-500' : 'bg-gray-600';
                const textClass = isVisited ? 'text-green-400' : 'text-gray-400';
                const icon = isVisited ? 'fa-check' : 'fa-location-dot';
                
                pinsHtml += `
                    <div class="flex items-center p-3 border-b border-gray-800 last:border-0">
                        <div class="w-8 h-8 rounded-full ${colorClass} bg-opacity-20 flex items-center justify-center mr-3">
                            <i class="fa-solid ${icon} ${colorClass.replace('bg-', 'text-')}"></i>
                        </div>
                        <div class="flex-grow">
                            <div class="text-sm font-bold ${textClass}">${loc}</div>
                            <div class="text-xs text-gray-500">${isVisited ? '已解鎖劇情' : '尚未探索'}</div>
                        </div>
                        <button class="px-3 py-1 text-xs border border-gray-600 rounded text-gray-300 hover:bg-gray-700">導航</button>
                    </div>
                `;
            });

            contentDiv.innerHTML = `
                <div class="text-center mb-4">
                    <p class="text-green-400 font-bold">📡 數位管制已解除</p>
                    <p class="text-xs text-gray-400 mt-1">AR 時空觀測鏡功能無限期開放</p>
                </div>
                
                <div class="bg-gray-900 rounded-xl border border-gray-700 overflow-hidden mb-4 shadow-lg shadow-black">
                    <div class="bg-gray-800 px-4 py-2 text-xs text-gray-300 border-b border-gray-700 flex justify-between">
                        <span>全區據點雷達</span>
                        <span>進度: ${visitedLocations.length}/8</span>
                    </div>
                    <div class="h-[300px] overflow-y-auto">
                        ${pinsHtml}
                    </div>
                </div>

                <div class="bg-blue-900/30 border border-blue-500/50 p-4 rounded text-sm text-blue-200">
                    <p>脫下特工的緊繃偽裝，以最放鬆的步伐享受街區吧！您可以自由前往錯過的站點捕捉地景，或至合作店家核銷美食金。</p>
                </div>
                
                <button onclick="location.reload()" class="mt-6 text-xs text-gray-500 underline text-center w-full">重新啟動 Demo</button>
            `;
        }

        // Initialize App
        window.onload = showQRScanScreen;
    </script>
</body>
</html>
